version: '3.8'

services:
  ssmp-api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: ssmp-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://ssmp:ssmp_2026!@boda-postgres:5432/ssmp
      JWT_SECRET: ssmp-prod-jwt-secret-2026
      NODE_ENV: production
      PORT: 3000
      CORS_ORIGIN: https://admin.ssmp.ocaya.space,https://ssmp.ocaya.space
      SOCKET_CORS_ORIGIN: https://admin.ssmp.ocaya.space,https://ssmp.ocaya.space
    ports:
      - "3005:3000"
    networks:
      - boda_default

  ssmp-admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
      args:
        VITE_API_URL: https://api.ssmp.ocaya.space
    container_name: ssmp-admin
    restart: unless-stopped
    ports:
      - "3006:80"

networks:
  boda_default:
    external: true
