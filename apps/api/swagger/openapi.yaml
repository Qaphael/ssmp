openapi: 3.0.3
info:
  title: SSMP — School Sports Competition Management Platform
  version: 1.0.0
  description: Multi-sport competition management API. Single source of truth for all clients.
  contact:
    name: Qaphael Design
    email: opiyoraphaellaflo@gmail.com
servers:
  - url: http://localhost:3001
    description: Development
tags:
  - name: Auth
    description: Authentication and authorization
  - name: Organizations
    description: Top-level organization management
  - name: Seasons
    description: Season management within organizations
  - name: Competitions
    description: Competition setup and configuration
  - name: Teams
    description: Team/school management
  - name: Players
    description: Player roster management
  - name: Registrations
    description: Team registration and approval
  - name: Rosters
    description: Roster submission and approval
  - name: Transfers
    description: Player transfer requests
  - name: Fixtures
    description: Fixture generation and scheduling
  - name: Matches
    description: Match lifecycle management
  - name: Match Events
    description: Live match events (goals, cards, etc.)
  - name: Lineups
    description: Team lineup submission
  - name: Standings
    description: Competition standings
  - name: Officials
    description: Referee/official management
  - name: Notifications
    description: User notifications
  - name: Audit Logs
    description: System audit trail
  - name: Media
    description: Media uploads and approval
  - name: News
    description: News articles and announcements
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        firstName:
          type: string
          minLength: 1
          maxLength: 100
        lastName:
          type: string
          minLength: 1
          maxLength: 100
        role:
          type: string
          enum: &a5
            - system_admin
            - comp_admin
            - registrar
            - referee_coordinator
            - media_officer
            - official
            - coach
        isActive:
          type: boolean
          default: true
        lastLoginAt:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - email
        - firstName
        - lastName
        - role
        - createdAt
        - updatedAt
    Organization:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
        logoUrl:
          type: string
          format: uri
        contactEmail:
          type: string
          format: email
        contactPhone:
          type: string
        address:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - name
        - createdAt
        - updatedAt
    Season:
      type: object
      properties:
        id:
          type: string
          format: uuid
        organizationId:
          type: string
          format: uuid
        name:
          type: string
          minLength: 1
          maxLength: 100
        startDate:
          type: string
        endDate:
          type: string
        isArchived:
          type: boolean
          default: false
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - organizationId
        - name
        - startDate
        - endDate
        - createdAt
        - updatedAt
    Competition:
      type: object
      properties:
        id:
          type: string
          format: uuid
        seasonId:
          type: string
          format: uuid
        name:
          type: string
          minLength: 1
          maxLength: 255
        sport:
          type: string
          enum: &a4
            - football
            - basketball
            - volleyball
            - athletics
            - swimming
            - other
        division:
          type: string
          maxLength: 100
        status:
          type: string
          enum: &a6
            - draft
            - setup
            - registration_open
            - registration_closed
            - in_progress
            - completed
            - archived
        rules:
          type: object
          properties:
            pointsForWin:
              type: integer
              minimum: 0
              default: 3
            pointsForDraw:
              type: integer
              minimum: 0
              default: 1
            pointsForLoss:
              type: integer
              minimum: 0
              default: 0
            matchDurationMinutes:
              type: integer
              minimum: 15
              maximum: 120
              default: 90
            halfTimeDurationMinutes:
              type: integer
              minimum: 0
              maximum: 30
              default: 15
            extraTimeDurationMinutes:
              type: integer
              minimum: 0
              maximum: 30
              default: 15
            allowedSubstitutions:
              type: integer
              minimum: 0
              maximum: 12
              default: 5
            yellowCardsForSuspension:
              type: integer
              minimum: 1
              maximum: 10
              default: 2
            suspensionMatches:
              type: integer
              minimum: 1
              maximum: 10
              default: 1
            redCardImmediateSuspension:
              type: boolean
              default: true
            walkoverDefaultScoreHome:
              type: integer
              minimum: 0
              maximum: 99
              default: 3
            walkoverDefaultScoreAway:
              type: integer
              minimum: 0
              maximum: 99
              default: 0
        registrationWindow:
          type: object
          properties:
            opensAt:
              type: string
            closesAt:
              type: string
          required:
            - opensAt
            - closesAt
        enableGroups:
          type: boolean
          default: false
        enableKnockouts:
          type: boolean
          default: false
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - seasonId
        - name
        - sport
        - status
        - rules
        - registrationWindow
        - createdAt
        - updatedAt
    Group:
      type: object
      properties:
        id:
          type: string
          format: uuid
        competitionId:
          type: string
          format: uuid
        name:
          type: string
          minLength: 1
          maxLength: 50
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - competitionId
        - name
        - createdAt
        - updatedAt
    Pitch:
      type: object
      properties:
        id:
          type: string
          format: uuid
        organizationId:
          type: string
          format: uuid
        name:
          type: string
          minLength: 1
          maxLength: 255
        address:
          type: string
        capacity:
          type: integer
          minimum: 0
        surfaceType:
          type: string
          maxLength: 50
        isAvailable:
          type: boolean
          default: true
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - organizationId
        - name
        - createdAt
        - updatedAt
    Team:
      type: object
      properties:
        id:
          type: string
          format: uuid
        competitionId:
          type: string
          format: uuid
        groupId:
          type: string
          format: uuid
        name:
          type: string
          minLength: 1
          maxLength: 255
        schoolName:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
        logoUrl:
          type: string
          format: uri
        primaryColor:
          type: string
          pattern: ^#[0-9A-Fa-f]{6}$
        secondaryColor:
          type: string
          pattern: ^#[0-9A-Fa-f]{6}$
        registrationStatus:
          type: string
          enum: &a1
            - pending
            - approved
            - rejected
        rosterApprovalStatus:
          type: string
          enum: &a2
            - draft
            - submitted
            - approved
            - rejected
        coachId:
          type: string
          format: uuid
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - competitionId
        - name
        - schoolName
        - registrationStatus
        - rosterApprovalStatus
        - coachId
        - createdAt
        - updatedAt
    Player:
      type: object
      properties:
        id:
          type: string
          format: uuid
        teamId:
          type: string
          format: uuid
        firstName:
          type: string
          minLength: 1
          maxLength: 100
        lastName:
          type: string
          minLength: 1
          maxLength: 100
        jerseyNumber:
          type: integer
          minimum: 0
          maximum: 99
        position:
          type: string
          maxLength: 50
        dateOfBirth:
          type: string
        nationality:
          type: string
          maxLength: 100
        height:
          type: number
          minimum: 0
          exclusiveMinimum: true
          maximum: 300
        weight:
          type: number
          minimum: 0
          exclusiveMinimum: true
          maximum: 300
        photoUrl:
          type: string
          format: uri
        status:
          type: string
          enum: &a7
            - active
            - injured
            - suspended
            - inactive
        injuryDetails:
          type: object
          properties:
            description:
              type: string
              minLength: 1
              maxLength: 500
            expectedReturnDate:
              type: string
            medicalNotes:
              type: string
              maxLength: 1000
          required:
            - description
            - expectedReturnDate
        suspensionDetails:
          type: object
          properties:
            reason:
              type: string
              minLength: 1
              maxLength: 500
            matchesRemaining:
              type: integer
              minimum: 0
          required:
            - reason
            - matchesRemaining
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - teamId
        - firstName
        - lastName
        - jerseyNumber
        - dateOfBirth
        - status
        - createdAt
        - updatedAt
    Coach:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        teamId:
          type: string
          format: uuid
        firstName:
          type: string
          minLength: 1
          maxLength: 100
        lastName:
          type: string
          minLength: 1
          maxLength: 100
        email:
          type: string
          format: email
        phone:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - userId
        - teamId
        - firstName
        - lastName
        - email
        - createdAt
        - updatedAt
    Official:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        name:
          type: string
          minLength: 1
          maxLength: 255
        email:
          type: string
          format: email
        phone:
          type: string
        certifications:
          type: array
          items:
            type: string
            maxLength: 100
        availability:
          type: object
          properties:
            weekdayEvenings:
              type: boolean
              default: true
            weekends:
              type: boolean
              default: true
            holidays:
              type: boolean
              default: false
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - userId
        - name
        - email
        - createdAt
        - updatedAt
    TeamRegistration:
      type: object
      properties:
        id:
          type: string
          format: uuid
        competitionId:
          type: string
          format: uuid
        teamName:
          type: string
          minLength: 1
          maxLength: 255
        schoolName:
          type: string
          minLength: 1
          maxLength: 255
        coachEmail:
          type: string
          format: email
        coachFirstName:
          type: string
          minLength: 1
          maxLength: 100
        coachLastName:
          type: string
          minLength: 1
          maxLength: 100
        status:
          type: string
          enum: *a1
        reviewedBy:
          type: string
          format: uuid
        reviewedAt:
          type: string
        rejectionReason:
          type: string
          maxLength: 500
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - competitionId
        - teamName
        - schoolName
        - coachEmail
        - coachFirstName
        - coachLastName
        - status
        - createdAt
        - updatedAt
    RosterSubmission:
      type: object
      properties:
        id:
          type: string
          format: uuid
        teamId:
          type: string
          format: uuid
        competitionId:
          type: string
          format: uuid
        playerIds:
          type: array
          items:
            type: string
            format: uuid
          minItems: 1
        status:
          type: string
          enum: *a2
        submittedBy:
          type: string
          format: uuid
        reviewedBy:
          type: string
          format: uuid
        reviewedAt:
          type: string
        rejectionReason:
          type: string
          maxLength: 500
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - teamId
        - competitionId
        - playerIds
        - status
        - submittedBy
        - createdAt
        - updatedAt
    TransferRequest:
      type: object
      properties:
        id:
          type: string
          format: uuid
        playerId:
          type: string
          format: uuid
        fromTeamId:
          type: string
          format: uuid
        toTeamId:
          type: string
          format: uuid
        competitionId:
          type: string
          format: uuid
        reason:
          type: string
          minLength: 1
          maxLength: 500
        status:
          type: string
          enum: &a8
            - pending
            - approved
            - rejected
        requestedBy:
          type: string
          format: uuid
        reviewedBy:
          type: string
          format: uuid
        reviewedAt:
          type: string
        rejectionReason:
          type: string
          maxLength: 500
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - playerId
        - fromTeamId
        - toTeamId
        - competitionId
        - reason
        - status
        - requestedBy
        - createdAt
        - updatedAt
    Fixture:
      type: object
      properties:
        id:
          type: string
          format: uuid
        competitionId:
          type: string
          format: uuid
        matchday:
          type: integer
          minimum: 1
        homeTeamId:
          type: string
          format: uuid
        awayTeamId:
          type: string
          format: uuid
        scheduledAt:
          type: string
        pitchId:
          type: string
          format: uuid
        status:
          type: string
          enum: &a3
            - scheduled
            - officials_assigned
            - lineups_submitted
            - lineups_locked
            - kickoff
            - half_time
            - second_half
            - extra_time
            - penalties
            - full_time
            - report_submitted
            - verified
            - published
            - postponed
            - cancelled
            - abandoned
            - walkover
        homeScore:
          type: integer
          minimum: 0
        awayScore:
          type: integer
          minimum: 0
        officialId:
          type: string
          format: uuid
        postponedReason:
          type: string
        walkoverTeamId:
          type: string
          format: uuid
        walkoverReason:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - competitionId
        - matchday
        - homeTeamId
        - awayTeamId
        - scheduledAt
        - status
        - createdAt
        - updatedAt
    Match:
      type: object
      properties:
        id:
          type: string
          format: uuid
        fixtureId:
          type: string
          format: uuid
        competitionId:
          type: string
          format: uuid
        homeTeamId:
          type: string
          format: uuid
        awayTeamId:
          type: string
          format: uuid
        homeScore:
          type: integer
          minimum: 0
          default: 0
        awayScore:
          type: integer
          minimum: 0
          default: 0
        status:
          type: string
          enum: *a3
        pitchId:
          type: string
          format: uuid
        scheduledAt:
          type: string
        startedAt:
          type: string
        halfTimeAt:
          type: string
        endedAt:
          type: string
        extraTimeEnabled:
          type: boolean
          default: false
        penaltiesEnabled:
          type: boolean
          default: false
        homePenalties:
          type: integer
          minimum: 0
        awayPenalties:
          type: integer
          minimum: 0
        officialId:
          type: string
          format: uuid
        reportSubmittedAt:
          type: string
        verifiedAt:
          type: string
        verifiedBy:
          type: string
          format: uuid
        publishedAt:
          type: string
        walkoverTeamId:
          type: string
          format: uuid
        walkoverReason:
          type: string
          maxLength: 500
        postponedReason:
          type: string
          maxLength: 500
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - fixtureId
        - competitionId
        - homeTeamId
        - awayTeamId
        - status
        - scheduledAt
        - createdAt
        - updatedAt
    MatchEvent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        matchId:
          type: string
          format: uuid
        type:
          type: string
          enum: &a14
            - kickoff
            - goal
            - own_goal
            - assist
            - yellow_card
            - red_card
            - substitution
            - half_time
            - full_time
            - extra_time_start
            - penalty_scored
            - penalty_missed
        minute:
          type: integer
          minimum: 0
          maximum: 120
        playerId:
          type: string
          format: uuid
        teamId:
          type: string
          format: uuid
        description:
          type: string
          maxLength: 500
        recordedBy:
          type: string
          format: uuid
        createdAt:
          type: string
      required:
        - id
        - matchId
        - type
        - minute
        - recordedBy
        - createdAt
    Lineup:
      type: object
      properties:
        id:
          type: string
          format: uuid
        matchId:
          type: string
          format: uuid
        teamId:
          type: string
          format: uuid
        playerIds:
          type: array
          items:
            type: string
            format: uuid
          minItems: 1
          maxItems: 20
        isStarting:
          type: boolean
          default: true
        isLocked:
          type: boolean
          default: false
        submittedBy:
          type: string
          format: uuid
        submittedAt:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - matchId
        - teamId
        - playerIds
        - submittedBy
        - submittedAt
        - createdAt
        - updatedAt
    Card:
      type: object
      properties:
        id:
          type: string
          format: uuid
        matchId:
          type: string
          format: uuid
        playerId:
          type: string
          format: uuid
        teamId:
          type: string
          format: uuid
        type:
          type: string
          enum: &a9
            - yellow
            - red
        minute:
          type: integer
          minimum: 0
          maximum: 120
        reason:
          type: string
          maxLength: 500
        competitionId:
          type: string
          format: uuid
        createdAt:
          type: string
      required:
        - id
        - matchId
        - playerId
        - teamId
        - type
        - minute
        - competitionId
        - createdAt
    Suspension:
      type: object
      properties:
        id:
          type: string
          format: uuid
        playerId:
          type: string
          format: uuid
        competitionId:
          type: string
          format: uuid
        reason:
          type: string
          minLength: 1
          maxLength: 500
        matchesCount:
          type: integer
          minimum: 1
        matchesServed:
          type: integer
          minimum: 0
          default: 0
        cardId:
          type: string
          format: uuid
        startDate:
          type: string
        endDate:
          type: string
        isServed:
          type: boolean
          default: false
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - playerId
        - competitionId
        - reason
        - matchesCount
        - startDate
        - createdAt
        - updatedAt
    Notification:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        type:
          type: string
          enum: &a10
            - fixture_published
            - fixture_changed
            - official_assigned
            - roster_approved
            - roster_rejected
            - transfer_approved
            - transfer_rejected
            - suspension_applied
            - kickoff_reminder
            - match_postponed
            - match_cancelled
        title:
          type: string
          minLength: 1
          maxLength: 255
        message:
          type: string
          minLength: 1
          maxLength: 1000
        data:
          type: object
          additionalProperties:
            nullable: true
        isRead:
          type: boolean
          default: false
        readAt:
          type: string
        createdAt:
          type: string
      required:
        - id
        - userId
        - type
        - title
        - message
        - createdAt
    AuditLog:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        action:
          type: string
          minLength: 1
          maxLength: 100
        entityType:
          type: string
          minLength: 1
          maxLength: 100
        entityId:
          type: string
          format: uuid
        oldValue:
          type: object
          additionalProperties:
            nullable: true
        newValue:
          type: object
          additionalProperties:
            nullable: true
        ipAddress:
          type: string
          format: ip
        userAgent:
          type: string
          maxLength: 500
        createdAt:
          type: string
      required:
        - id
        - userId
        - action
        - entityType
        - entityId
        - createdAt
    Media:
      type: object
      properties:
        id:
          type: string
          format: uuid
        uploadedBy:
          type: string
          format: uuid
        type:
          type: string
          enum: &a11
            - logo
            - photo
            - video
            - document
        url:
          type: string
          format: uri
        filename:
          type: string
          minLength: 1
          maxLength: 255
        fileSize:
          type: integer
          minimum: 0
        mimeType:
          type: string
          maxLength: 100
        caption:
          type: string
          maxLength: 500
        matchId:
          type: string
          format: uuid
        teamId:
          type: string
          format: uuid
        playerId:
          type: string
          format: uuid
        isApproved:
          type: boolean
          default: false
        approvedBy:
          type: string
          format: uuid
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - uploadedBy
        - type
        - url
        - filename
        - fileSize
        - mimeType
        - createdAt
        - updatedAt
    NewsArticle:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
          minLength: 1
          maxLength: 255
        content:
          type: string
          minLength: 1
        excerpt:
          type: string
          maxLength: 500
        authorId:
          type: string
          format: uuid
        isPublished:
          type: boolean
          default: false
        publishedAt:
          type: string
        competitionId:
          type: string
          format: uuid
        teamId:
          type: string
          format: uuid
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - title
        - content
        - authorId
        - createdAt
        - updatedAt
    Standing:
      type: object
      properties:
        id:
          type: string
          format: uuid
        competitionId:
          type: string
          format: uuid
        teamId:
          type: string
          format: uuid
        groupId:
          type: string
          format: uuid
        played:
          type: integer
          minimum: 0
          default: 0
        won:
          type: integer
          minimum: 0
          default: 0
        drawn:
          type: integer
          minimum: 0
          default: 0
        lost:
          type: integer
          minimum: 0
          default: 0
        goalsFor:
          type: integer
          minimum: 0
          default: 0
        goalsAgainst:
          type: integer
          minimum: 0
          default: 0
        goalDifference:
          type: integer
          default: 0
        points:
          type: integer
          minimum: 0
          default: 0
        position:
