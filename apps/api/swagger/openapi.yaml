paths:
  /api/auth/login:
    post:
      tags:
        - Auth
      summary: Login with email and password
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
              required:
                - email
                - password
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      email:
                        type: string
                        format: email
                      firstName:
                        type: string
                        minLength: 1
                        maxLength: 100
                      lastName:
                        type: string
                        minLength: 1
                        maxLength: 100
                      role:
                        type: string
                        enum: *a5
                      isActive:
                        type: boolean
                        default: true
                      lastLoginAt:
                        type: string
                      createdAt:
                        type: string
                      updatedAt:
                        type: string
                    required:
                      - id
                      - email
                      - firstName
                      - lastName
                      - role
                      - createdAt
                      - updatedAt
                  accessToken:
                    type: string
                  refreshToken:
                    type: string
                  expiresIn:
                    type: integer
                    minimum: 0
                    exclusiveMinimum: true
                required:
                  - user
                  - accessToken
                  - refreshToken
                  - expiresIn
        "401":
          description: Invalid credentials
